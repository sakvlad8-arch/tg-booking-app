<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vlad Coaching</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 95px;
            transition: background-color 0.3s, color 0.3s;
        }
        body.theme-wine { background-color: #3F1521; color: #f4f4f5; }
        body.theme-wine .bg-secondary { background-color: #2D0F18; }
        body.theme-wine .text-accent { color: #9DB3D3; }
        body.theme-wine .btn-primary { background-color: #9DB3D3; color: #3F1521; }
        body.theme-wine .border-accent { border-color: rgba(157, 179, 211, 0.3); }

        body.theme-dark { background-color: #111827; color: #f9fafb; }
        body.theme-dark .bg-secondary { background-color: #1f2937; }
        body.theme-dark .text-accent { color: #38bdf8; }
        body.theme-dark .btn-primary { background-color: #38bdf8; color: #111827; }
        body.theme-dark .border-accent { border-color: rgba(56, 189, 248, 0.3); }

        body.theme-light { background-color: #f0fdfa; color: #111827; }
        body.theme-light .bg-secondary { background-color: #ffffff; border: 1px solid #e2e8f0; }
        body.theme-light .text-accent { color: #0d9488; }
        body.theme-light .btn-primary { background-color: #0d9488; color: #ffffff; }
        body.theme-light .border-accent { border-color: #cbd5e1; }

        .tab-active { font-weight: bold; }
        body.theme-wine .tab-active { color: #9DB3D3; }
        body.theme-dark .tab-active { color: #38bdf8; }
        body.theme-light .tab-active { color: #0d9488; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto theme-wine">

    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div id="screen-register" class="hidden space-y-5 py-6">
        <div class="text-center">
            <span class="text-4xl">👋</span>
            <h2 class="text-xl font-black mt-2">Добро пожаловать!</h2>
            <p class="text-xs opacity-70 mt-1">Для доступа к записям пройдите быструю регистрацию</p>
        </div>
        <div class="bg-secondary p-4 rounded-2xl border border-accent space-y-3 shadow-md">
            <div>
                <label class="block text-xs font-bold mb-1 opacity-80">Имя:</label>
                <input type="text" id="reg-name" class="w-full p-2.5 rounded-xl bg-black/20 border border-accent text-sm outline-none">
            </div>
            <div>
                <label class="block text-xs font-bold mb-1 opacity-80">Фамилия:</label>
                <input type="text" id="reg-surname" class="w-full p-2.5 rounded-xl bg-black/20 border border-accent text-sm outline-none">
            </div>
            <div>
                <label class="block text-xs font-bold mb-1 opacity-80">Номер телефона:</label>
                <input type="tel" id="reg-phone" placeholder="+375" class="w-full p-2.5 rounded-xl bg-black/20 border border-accent text-sm outline-none">
            </div>
            <div>
                <label class="block text-xs font-bold mb-1 opacity-80">Дата рождения:</label>
                <input type="date" id="reg-birthday" class="w-full p-2.5 rounded-xl bg-black/20 border border-accent text-sm outline-none">
            </div>
            <button onclick="submitRegistration()" class="btn-primary w-full py-3 rounded-xl font-bold text-sm cursor-pointer">Завершить регистрацию</button>
        </div>
    </div>

    <!-- ОКНО ДЛЯ ОТПРАВКИ ОТЗЫВА -->
    <div id="screen-leave-review" class="hidden space-y-4 py-4">
        <h2 class="text-lg font-black text-accent text-center">📝 Оставить отзыв о занятии</h2>
        <div class="bg-secondary p-4 rounded-2xl border border-accent space-y-3 shadow-md">
            <div class="flex justify-center gap-3 text-2xl" id="review-stars">
                <span onclick="setReviewRating(1)" class="cursor-pointer star-btn text-zinc-400">★</span>
                <span onclick="setReviewRating(2)" class="cursor-pointer star-btn text-zinc-400">★</span>
                <span onclick="setReviewRating(3)" class="cursor-pointer star-btn text-zinc-400">★</span>
                <span onclick="setReviewRating(4)" class="cursor-pointer star-btn text-zinc-400">★</span>
                <span onclick="setReviewRating(5)" class="cursor-pointer star-btn text-zinc-400">★</span>
            </div>
            <textarea id="review-text" placeholder="Напишите, как всё прошло..." class="w-full p-3 bg-black/20 border border-accent text-xs rounded-xl outline-none h-24 resize-none"></textarea>
            <button onclick="submitReview()" class="btn-primary w-full py-3 rounded-xl font-bold text-sm cursor-pointer">Отправить</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div id="app-content" class="hidden">
        <!-- (Твой существующий контент экранов остается здесь) -->
        <div id="screen-main" class="screen space-y-5">
            <div class="text-center py-2">
                <div class="w-24 h-24 bg-[rgba(157,179,211,0.2)] rounded-full mx-auto mb-3 flex items-center justify-center text-3xl border-2 border-accent">🏒</div>
                <h1 class="text-2xl font-black tracking-tight">Влад | На связи</h1>
            </div>
            <!-- ... остальные блоки экрана main ... -->
            <div id="reviews-feed" class="space-y-2 max-h-60 overflow-y-auto pr-1"></div>
        </div>
        <!-- Экраны: screen-services, screen-time, screen-confirm, screen-settings -->
    </div>

    <!-- ТАБ-БАР -->
    <div id="tab-bar" class="hidden fixed bottom-0 left-0 right-0 bg-[#2D0F18] border-t border-[rgba(157,179,211,0.15)] px-2 py-2 flex justify-around items-center text-[10px] z-50">
        <!-- Твои кнопки таб-бара -->
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        const serverUrl = 'https://vlad-coaching.onrender.com';
        let bookingData = { category: '', service: '', price: '', date: '', time: '', raw_date: '', user_id: 0 };
        
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            bookingData.user_id = tg.initDataUnsafe.user.id;
        }

        // Логика проверки регистрации
        async function checkUserRegistration() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('action') === 'leave_review') {
                document.getElementById('screen-leave-review').classList.remove('hidden');
                return;
            }

            if (!bookingData.user_id) return;

            try {
                const response = await fetch(`${serverUrl}/check_user/${bookingData.user_id}`);
                const data = await response.json();
                if (data.registered) {
                    document.getElementById('app-content').classList.remove('hidden');
                    document.getElementById('tab-bar').classList.remove('hidden');
                    loadReviews();
                } else {
                    document.getElementById('screen-register').classList.remove('hidden');
                }
            } catch (e) {
                console.error("Ошибка сети:", e);
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('tab-bar').classList.remove('hidden');
            }
        }

        checkUserRegistration();

        // ... (все остальные твои функции: changeTheme, submitRegistration, и т.д.) ...
    </script>
</body>
</html>
