<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vlad Coaching</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; padding-bottom: 95px; transition: background-color 0.3s, color 0.3s; }
        body.theme-wine { background-color: #3F1521; color: #f4f4f5; }
        body.theme-wine .bg-secondary { background-color: #2D0F18; }
        body.theme-wine .text-accent { color: #9DB3D3; }
        body.theme-wine .btn-primary { background-color: #9DB3D3; color: #3F1521; }
        body.theme-wine .border-accent { border-color: rgba(157, 179, 211, 0.3); }

        body.theme-dark { background-color: #111827; color: #f9fafb; }
        body.theme-dark .bg-secondary { background-color: #1f2937; }
        body.theme-dark .text-accent { color: #38bdf8; }
        body.theme-dark .btn-primary { background-color: #38bdf8; color: #111827; }
        body.theme-dark .border-accent { border-color: rgba(56, 189, 248, 0.3); }

        body.theme-light { background-color: #f0fdfa; color: #111827; }
        body.theme-light .bg-secondary { background-color: #ffffff; border: 1px solid #e2e8f0; }
        body.theme-light .text-accent { color: #0d9488; }
        body.theme-light .btn-primary { background-color: #0d9488; color: #ffffff; }
        body.theme-light .border-accent { border-color: #cbd5e1; }

        .tab-active { font-weight: bold; }
        body.theme-wine .tab-active { color: #9DB3D3; }
        body.theme-dark .tab-active { color: #38bdf8; }
        body.theme-light .tab-active { color: #0d9488; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto theme-wine">

    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div id="screen-register" class="hidden space-y-5 py-6">
        <div class="text-center">
            <span class="text-4xl">👋</span>
            <h2 class="text-xl font-black mt-2">Добро пожаловать!</h2>
            <p class="text-xs opacity-70 mt-1">Для доступа к записям пройдите быструю регистрацию</p>
        </div>
        <div class="bg-secondary p-4 rounded-2xl border border-accent space-y-3 shadow-md">
            <input type="text" id="reg-name" placeholder="Имя" class="w-full p-2.5 rounded-xl bg-black/20 border border-accent text-sm outline-none">
            <input type="text" id="reg-surname" placeholder="Фамилия" class="w-full p-2.5 rounded-xl bg-black/20 border border-accent text-sm outline-none">
            <input type="tel" id="reg-phone" placeholder="Номер телефона (+375...)" class="w-full p-2.5 rounded-xl bg-black/20 border border-accent text-sm outline-none">
            <input type="date" id="reg-birthday" class="w-full p-2.5 rounded-xl bg-black/20 border border-accent text-sm outline-none">
            <button onclick="submitRegistration()" class="btn-primary w-full py-3 rounded-xl font-bold text-sm">Завершить регистрацию</button>
        </div>
    </div>

    <!-- ОКНО ОТЗЫВА -->
    <div id="screen-leave-review" class="hidden space-y-4 py-4">
        <h2 class="text-lg font-black text-accent text-center">📝 Оставить отзыв</h2>
        <div class="bg-secondary p-4 rounded-2xl border border-accent space-y-3">
            <div class="flex justify-center gap-3 text-2xl" id="review-stars">
                <span onclick="setReviewRating(1)" class="cursor-pointer star-btn text-zinc-400">★</span>
                <span onclick="setReviewRating(2)" class="cursor-pointer star-btn text-zinc-400">★</span>
                <span onclick="setReviewRating(3)" class="cursor-pointer star-btn text-zinc-400">★</span>
                <span onclick="setReviewRating(4)" class="cursor-pointer star-btn text-zinc-400">★</span>
                <span onclick="setReviewRating(5)" class="cursor-pointer star-btn text-zinc-400">★</span>
            </div>
            <textarea id="review-text" placeholder="Ваше мнение..." class="w-full p-3 bg-black/20 border border-accent text-xs rounded-xl h-24"></textarea>
            <button onclick="submitReview()" class="btn-primary w-full py-3 rounded-xl font-bold text-sm">Отправить</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div id="app-content" class="hidden">
        <div id="screen-main" class="screen space-y-5">
            <div class="text-center py-2">
                <div class="w-24 h-24 bg-[rgba(157,179,211,0.2)] rounded-full mx-auto mb-3 flex items-center justify-center text-3xl border-2 border-accent">🏒</div>
                <h1 class="text-2xl font-black tracking-tight">Влад | На связи</h1>
            </div>
            <div id="reviews-feed" class="bg-secondary p-4 rounded-2xl border border-accent space-y-3">
                <h3 class="font-bold text-sm uppercase text-accent">Отзывы учеников</h3>
            </div>
        </div>

        <div id="screen-services" class="screen hidden space-y-4">
            <h2 id="category-title" class="text-lg font-black text-accent">Направление</h2>
            <div id="services-list" class="space-y-3"></div>
        </div>

        <div id="screen-time" class="screen hidden space-y-4">
            <button onclick="backToServices()" class="text-sm text-accent">← Назад</button>
            <input type="date" id="date-picker" onchange="onDateSelected(this.value)" class="w-full p-3 rounded-xl bg-secondary border border-accent">
            <div id="time-slots-container" class="grid grid-cols-3 gap-2"></div>
        </div>

        <div id="screen-confirm" class="screen hidden space-y-4">
            <div class="bg-secondary p-4 rounded-xl border border-accent text-sm">
                <p><strong>Услуга:</strong> <span id="summary-service">-</span></p>
                <p><strong>Дата:</strong> <span id="summary-datetime">-</span></p>
            </div>
            <button onclick="submitBooking()" class="btn-primary w-full py-3 rounded-xl font-bold">Подтвердить</button>
        </div>

        <div id="screen-settings" class="screen hidden space-y-4">
            <button onclick="changeTheme('theme-wine')" class="w-full p-3 rounded-xl bg-[#3F1521] text-white">Винная</button>
            <button onclick="changeTheme('theme-dark')" class="w-full p-3 rounded-xl bg-[#111827] text-white">Темная</button>
        </div>
    </div>

    <!-- ТАБ-БАР -->
    <div id="tab-bar" class="hidden fixed bottom-0 left-0 right-0 bg-[#2D0F18] border-t px-2 py-2 flex justify-around items-center text-[10px] z-50">
        <div onclick="navigateTo('main')" id="tab-main" class="flex flex-col items-center"><span>👤</span>Главная</div>
        <div onclick="navigateTo('gym')" class="flex flex-col items-center"><span>🏋️</span>Зал</div>
        <div onclick="navigateTo('skating')" class="flex flex-col items-center"><span>⛸️</span>Коньки</div>
        <div onclick="navigateTo('hockey')" class="flex flex-col items-center"><span>🏒</span>Хоккей</div>
        <div onclick="navigateTo('settings')" class="flex flex-col items-center"><span>⚙️</span>Настройки</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        const serverUrl = 'https://vlad-coaching.onrender.com';
        let bookingData = { user_id: tg.initDataUnsafe?.user?.id };

        // ЛОГИКА ОДНОКРАТНОЙ РЕГИСТРАЦИИ
        async function checkAccess() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('action') === 'leave_review') {
                document.getElementById('screen-leave-review').classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch(`${serverUrl}/check_user/${bookingData.user_id}`);
                const data = await res.json();
                if (data.registered) {
                    document.getElementById('app-content').classList.remove('hidden');
                    document.getElementById('tab-bar').classList.remove('hidden');
                    loadReviews();
                } else {
                    document.getElementById('screen-register').classList.remove('hidden');
                }
            } catch (e) {
                document.getElementById('app-content').classList.remove('hidden');
            }
        }

        function submitRegistration() {
            const data = {
                user_id: bookingData.user_id,
                first_name: document.getElementById('reg-name').value,
                last_name: document.getElementById('reg-surname').value,
                phone: document.getElementById('reg-phone').value,
                birthday: document.getElementById('reg-birthday').value
            };
            fetch(`${serverUrl}/register`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) })
            .then(() => { location.reload(); });
        }

        // Остальной функционал (navigateTo, submitBooking и т.д.) сохраняется в твоем коде
        checkAccess();
        // ... (добавь здесь свои функции навигации и работы с API из старого кода)
    </script>
</body>
</html>
