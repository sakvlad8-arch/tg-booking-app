<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vlad Coaching</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* (Твои стили тем остаются без изменений, просто добавь их сюда) */
        body { font-family: -apple-system, sans-serif; padding-bottom: 95px; }
        .screen { display: none; }
        .active { display: block; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto theme-wine">

    <!-- ХЕДЕР С НАСТРОЙКАМИ -->
    <header class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-black">Vlad Coaching</h1>
        <button onclick="navigateTo('settings')" class="text-2xl">⚙️</button>
    </header>

    <!-- ЭКРАНЫ -->
    <div id="app-content">
        
        <!-- ГЛАВНАЯ (Лента отзывов) -->
        <div id="screen-main" class="screen active">
            <div class="bg-secondary p-4 rounded-2xl border border-accent">
                <h3 class="font-bold mb-3">💬 Отзывы учеников</h3>
                <div id="reviews-feed" class="space-y-2"></div>
            </div>
        </div>

        <!-- КАТЕГОРИИ (Выбор категории) -->
        <div id="screen-categories" class="screen">
            <h2 class="text-lg font-bold mb-4">Выберите направление</h2>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="selectCategory('gym', 'Тренажерный зал')" class="p-4 bg-secondary rounded-xl border border-accent">🏋️‍♂️ Зал</button>
                <button onclick="selectCategory('skating', 'Катание на коньках')" class="p-4 bg-secondary rounded-xl border border-accent">⛸️ Коньки</button>
                <button onclick="selectCategory('hockey', 'Хоккейное мастерство')" class="p-4 bg-secondary rounded-xl border border-accent">🏒 Хоккей</button>
                <button onclick="selectCategory('dry-ice', 'Сухой лед')" class="p-4 bg-secondary rounded-xl border border-accent">🎯 Сухой лед</button>
            </div>
        </div>

        <!-- КАЛЕНДАРЬ И ВРЕМЯ (Сначала дата, потом время) -->
        <div id="screen-datetime" class="screen">
            <button onclick="navigateTo('categories')" class="text-sm opacity-60 mb-4">← Назад</button>
            <input type="date" id="date-picker" onchange="onDateSelected(this.value)" class="w-full p-3 bg-secondary rounded-xl border border-accent mb-4">
            <div id="slots-grid" class="grid grid-cols-3 gap-2"></div>
        </div>

        <!-- ВЫБОР УСЛУГИ (После выбора времени) -->
        <div id="screen-services" class="screen">
            <button onclick="document.getElementById('screen-datetime').classList.add('active');" class="text-sm opacity-60 mb-4">← Назад</button>
            <h2 class="font-bold mb-3">Выберите услугу:</h2>
            <div id="services-list" class="space-y-3"></div>
        </div>
    </div>

    <!-- ТАБ-БАР -->
    <div class="fixed bottom-0 left-0 right-0 bg-secondary border-t border-accent p-3 flex justify-around">
        <button onclick="navigateTo('main')">👤</button>
        <button onclick="navigateTo('categories')">📅 Запись</button>
    </div>

    <script>
        let bookingData = { category: '', service: '', date: '', time: '', raw_date: '', user_id: 0 };
        const servicesData = {
            gym: [{ name: 'Персональная', price: '40 BYN' }],
            skating: [{ name: 'Взрослый', price: '55 BYN' }],
            hockey: [{ name: 'Мастерство', price: '55 BYN' }],
            'dry-ice': [{ name: 'Броски', price: '35 BYN' }]
        };

        function navigateTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + screenId).classList.add('active');
        }

        function selectCategory(key, title) {
            bookingData.category = title;
            bookingData.categoryKey = key;
            navigateTo('datetime');
        }

        function onDateSelected(val) {
            bookingData.raw_date = val;
            fetch(`${serverUrl}/get_blocked_slots/${val}`)
                .then(r => r.json())
                .then(data => {
                    const grid = document.getElementById('slots-grid');
                    grid.innerHTML = "";
                    for(let h = 8; h <= 22; h++) {
                        let t = `${h}:00`;
                        let btn = document.createElement('button');
                        btn.innerText = t;
                        if(data.blocked_slots.includes(t)) btn.disabled = true;
                        else btn.onclick = () => showServices(t);
                        grid.appendChild(btn);
                    }
                });
        }

        function showServices(time) {
            bookingData.time = time;
            const container = document.getElementById('services-list');
            container.innerHTML = '';
            servicesData[bookingData.categoryKey].forEach(s => {
                let btn = document.createElement('button');
                btn.className = "w-full p-4 bg-secondary border border-accent rounded-xl text-left";
                btn.innerHTML = `<div>${s.name}</div><div class="text-accent">${s.price}</div>`;
                btn.onclick = () => confirmBooking(s.name, s.price);
                container.appendChild(btn);
            });
            navigateTo('services');
        }
        
        // ... (остальные функции подтверждения и регистрации остаются из прошлой версии)
    </script>
</body>
</html>
