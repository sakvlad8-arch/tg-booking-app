<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Запись на тренировки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #111827;
            color: #f9fafb;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-active {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-24">

    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div id="registration-screen" class="hidden">
        <h2 class="text-2xl font-bold mb-2 text-center text-blue-400">Привет! 👋</h2>
        <p class="text-gray-400 text-sm mb-6 text-center">Заполни форму один раз, чтобы быстро записываться на тренировки.</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs text-gray-400 uppercase mb-1 font-semibold tracking-wider">Имя</label>
                <input id="reg-firstname" type="text" placeholder="Введите имя" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs text-gray-400 uppercase mb-1 font-semibold tracking-wider">Фамилия</label>
                <input id="reg-lastname" type="text" placeholder="Введите фамилию" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs text-gray-400 uppercase mb-1 font-semibold tracking-wider">Телефон</label>
                <input id="reg-phone" type="tel" placeholder="+375 (XX) XXX-XX-XX" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs text-gray-400 uppercase mb-1 font-semibold tracking-wider">Дата рождения</label>
                <input id="reg-birthday" type="date" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500">
            </div>
            
            <button onclick="submitRegistration()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition mt-4 shadow-lg shadow-blue-600/20">
                Сохранить профиль
            </button>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ЭКРАН (ВЫБОР КАТЕГОРИИ) -->
    <div id="main-screen" class="hidden space-y-4">
        <h2 class="text-xl font-extrabold text-white mb-2 tracking-wide uppercase text-center text-blue-500">Выбери направление</h2>
        
        <button onclick="selectCategory('Тренажерный зал')" class="w-full bg-gray-800 border border-gray-700 rounded-2xl p-4 text-left flex items-center justify-between hover:border-gray-600 active:scale-[0.98] transition">
            <div class="flex items-center space-x-3.5">
                <span class="text-3xl">💪</span>
                <div>
                    <h3 class="font-bold text-lg text-white">Тренажерный зал</h3>
                    <p class="text-xs text-gray-400">Персональные тренировки (Немига)</p>
                </div>
            </div>
            <span class="text-gray-500 text-xl">➔</span>
        </button>

        <button onclick="selectCategory('Катание на коньках')" class="w-full bg-gray-800 border border-gray-700 rounded-2xl p-4 text-left flex items-center justify-between hover:border-gray-600 active:scale-[0.98] transition">
            <div class="flex items-center space-x-3.5">
                <span class="text-3xl">⛸️</span>
                <div>
                    <h3 class="font-bold text-lg text-white">Катание на коньках</h3>
                    <p class="text-xs text-gray-400">Техника катания (ТРЦ Замок)</p>
                </div>
            </div>
            <span class="text-gray-500 text-xl">➔</span>
        </button>

        <button onclick="selectCategory('Хоккейное мастерство')" class="w-full bg-gray-800 border border-gray-700 rounded-2xl p-4 text-left flex items-center justify-between hover:border-gray-600 active:scale-[0.98] transition">
            <div class="flex items-center space-x-3.5">
                <span class="text-3xl">🏒</span>
                <div>
                    <h3 class="font-bold text-lg text-white">Хоккейное мастерство</h3>
                    <p class="text-xs text-gray-400">Дриблинг, броски, катание (Чижовка)</p>
                </div>
            </div>
            <span class="text-gray-500 text-xl">➔</span>
        </button>

        <button onclick="selectCategory('Броски на сухом льду')" class="w-full bg-gray-800 border border-gray-700 rounded-2xl p-4 text-left flex items-center justify-between hover:border-gray-600 active:scale-[0.98] transition">
            <div class="flex items-center space-x-3.5">
                <span class="text-3xl">🎯</span>
                <div>
                    <h3 class="font-bold text-lg text-white">Броски на сухом льду</h3>
                    <p class="text-xs text-gray-400">Постановка броска (Кальварийская)</p>
                </div>
            </div>
            <span class="text-gray-500 text-xl">➔</span>
        </button>
    </div>

    <!-- ЭКРАН УСЛУГ -->
    <div id="services-screen" class="hidden">
        <button onclick="goBack('main-screen')" class="text-blue-400 text-sm font-semibold mb-4 flex items-center">← Назад к категориям</button>
        <h2 id="services-title" class="text-xl font-bold mb-4 text-white"></h2>
        <div id="services-container" class="space-y-3"></div>
    </div>

    <!-- ЭКРАН КАЛЕНДАРЯ И ВРЕМЕНИ -->
    <div id="datetime-screen" class="hidden">
        <button onclick="goBack('services-screen')" class="text-blue-400 text-sm font-semibold mb-4 flex items-center">← Назад к услугам</button>
        <h2 class="text-xl font-bold mb-4 text-white">Выбор даты и времени</h2>
        
        <div class="bg-gray-800 border border-gray-700 rounded-2xl p-4 mb-5">
            <label class="block text-xs text-gray-400 uppercase font-semibold tracking-wider mb-2">Выберите дату:</label>
            <input id="datepicker" type="date" onchange="onDateSelected(this.value)" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500">
        </div>

        <div id="time-slots-container" class="hidden">
            <label class="block text-xs text-gray-400 uppercase font-semibold tracking-wider mb-3">Доступное время:</label>
            <div id="slots-grid" class="grid grid-cols-3 gap-2.5"></div>
        </div>
    </div>

    <!-- ЭКРАН ОТЗЫВОВ -->
    <div id="reviews-screen" class="hidden space-y-4">
        <h2 class="text-xl font-bold text-white text-center">Оставить отзыв</h2>
        <div class="flex justify-center space-x-2 text-3xl my-2">
            <span class="star cursor-pointer text-gray-600" onclick="setRating(1)">★</span>
            <span class="star cursor-pointer text-gray-600" onclick="setRating(2)">★</span>
            <span class="star cursor-pointer text-gray-600" onclick="setRating(3)">★</span>
            <span class="star cursor-pointer text-gray-600" onclick="setRating(4)">★</span>
            <span class="star cursor-pointer text-gray-600" onclick="setRating(5)">★</span>
        </div>
        <textarea id="review-text" rows="4" placeholder="Напишите ваши впечатления о тренировке..." class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500"></textarea>
        <button onclick="submitReview()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 rounded-xl transition">Отправить отзыв</button>
    </div>

    <!-- НИЖНЯЯ ПАНЕЛЬ НАВИГАЦИИ -->
    <div class="fixed bottom-0 left-0 right-0 bg-gray-900/90 backdrop-blur-md border-t border-gray-800 py-2.5 flex justify-around max-w-md mx-auto">
        <button onclick="navClick('main')" class="flex flex-col items-center space-y-0.5 text-blue-500" id="nav-main">
            <span class="text-xl">📅</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Запись</span>
        </button>
        <button onclick="navClick('reviews-list')" class="flex flex-col items-center space-y-0.5 text-gray-400" id="nav-reviews">
            <span class="text-xl">💬</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Отзывы</span>
        </button>
    </div>

    <!-- СТРАНИЦА ПРОСМОТРА ОТЗЫВОВ -->
    <div id="reviews-list-screen" class="hidden space-y-4">
        <h2 class="text-xl font-bold text-white mb-2">Отзывы клиентов</h2>
        <div id="reviews-list-container" class="space-y-3"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const user_id = tg.initDataUnsafe?.user?.id || 0;
        const serverUrl = "https://9cfd-37-214-43-98.ngrok-free.app";

        let currentRating = 0;
        let bookingData = { category: "", service: "", price: "", date: "", time: "", raw_date: "", user_id: user_id };

        const servicesData = {
            "Тренажерный зал": [
                { name: "Разовая тренировка", price: "50 BYN" },
                { name: "Блок из 4 тренировок", price: "180 BYN" },
                { name: "Блок из 8 тренировок", price: "340 BYN" },
                { name: "Блок из 12 тренировок", price: "480 BYN" }
            ],
            "Катание на коньках": [
                { name: "Индивидуальное занятие", price: "60 BYN" },
                { name: "Сплит-тренировка (2 чел)", price: "90 BYN" }
            ],
            "Хоккейное мастерство": [
                { name: "Разовое занятие", price: "65 BYN" },
                { name: "Абонемент на 4 занятия", price: "240 BYN" }
            ],
            "Броски на сухом льду": [
                { name: "Постановка броска 60 мин", price: "45 BYN" },
                { name: "Дриблинг + броски 60 мин", price: "50 BYN" }
            ]
        };

        // Запуск инициализации приложения
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('action') === 'leave_review') {
            showScreen('reviews-screen');
        } else {
            fetch(`${serverUrl}/check_user/${user_id}`)
                .then(res => res.json())
                .then(data => {
                    if (data.registered) showScreen('main-screen');
                    else showScreen('registration-screen');
                })
                .catch(() => showScreen('main-screen'));
        }

        function showScreen(screenId) {
            ['registration-screen', 'main-screen', 'services-screen', 'datetime-screen', 'reviews-screen', 'reviews-list-screen'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
            
            if (screenId === 'datetime-screen' || screenId === 'services-screen' || screenId === 'registration-screen') {
                tg.BackButton.show();
                tg.BackButton.onClick(handleBack);
            } else {
                tg.BackButton.hide();
            }
        }

        function handleBack() {
            if (!document.getElementById('datetime-screen').classList.contains('hidden')) goBack('services-screen');
            else if (!document.getElementById('services-screen').classList.contains('hidden')) goBack('main-screen');
            else tg.close();
        }

        function goBack(targetId) { showScreen(targetId); }

        function submitRegistration() {
            const data = {
                user_id: user_id,
                first_name: document.getElementById('reg-firstname').value,
                last_name: document.getElementById('reg-lastname').value,
                phone: document.getElementById('reg-phone').value,
                birthday: document.getElementById('reg-birthday').value
            };
            if(!data.first_name || !data.phone) { alert("Заполните Имя и Телефон!"); return; }
            fetch(`${serverUrl}/register`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(() => showScreen('main-screen'));
        }

        function selectCategory(cat) {
            bookingData.category = cat;
            document.getElementById('services-title').innerText = cat;
            const container = document.getElementById('services-container');
            container.innerHTML = "";
            
            servicesData[cat].forEach(s => {
                const btn = document.createElement('button');
                btn.className = "w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-left flex justify-between items-center active:scale-[0.99] transition";
                btn.innerHTML = `<div><div class="font-bold text-white">${s.name}</div></div><div class="text-blue-400 font-extrabold">${s.price}</div>`;
                btn.onclick = () => selectService(s.name, s.price);
                container.appendChild(btn);
            });
            showScreen('services-screen');
        }

        function selectService(name, price) {
            bookingData.service = name;
            bookingData.price = price;
            
            // Настройка ограничений на календарь (от сегодня на 14 дней вперед)
            const today = new Date().toISOString().split('T')[0];
            const maxDate = new Date();
            maxDate.setDate(maxDate.getDate() + 14);
            const maxStr = maxDate.toISOString().split('T')[0];
            
            const dp = document.getElementById('datepicker');
            dp.value = "";
            dp.min = today;
            dp.max = maxStr;
            
            document.getElementById('time-slots-container').classList.add('hidden');
            showScreen('datetime-screen');
        }

        function onDateSelected(val) {
            if (!val) return;
            bookingData.raw_date = val;
            const parts = val.split('-');
            const d = new Date(parts[0], parts[1] - 1, parts[2]);
            bookingData.date = d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
            
            // Добавлена отправка ?category= на бэкенд для умного скрытия окон переезда
            fetch(`${serverUrl}/get_blocked_slots/${val}?category=${encodeURIComponent(bookingData.category)}`)
                .then(res => res.json())
                .then(data => {
                    generateTimeSlots(data.blocked_slots);
                    document.getElementById('time-slots-container').classList.remove('hidden');
                });
        }

        function generateTimeSlots(blockedSlots) {
            const grid = document.getElementById('slots-grid');
            grid.innerHTML = "";
            for (let hour = 7; hour <= 22; hour++) {
                const timeStr = `${hour < 10 ? '0' + hour : hour}:00`;
                const isBlocked = blockedSlots.includes(timeStr);
                
                const btn = document.createElement('button');
                btn.innerText = timeStr;
                if (isBlocked) {
                    btn.className = "bg-gray-900 border border-gray-800 text-gray-600 rounded-xl py-3 text-sm font-semibold cursor-not-allowed opacity-40";
                    btn.disabled = true;
                } else {
                    btn.className = "bg-gray-800 border border-gray-700 text-white rounded-xl py-3 text-sm font-bold hover:border-blue-500 active:scale-95 transition";
                    btn.onclick = () => confirmBooking(timeStr);
                }
                grid.appendChild(btn);
            }
        }

        function confirmBooking(time) {
            bookingData.time = time;
            if (confirm(`Записаться на ${bookingData.date} в ${time}?`)) {
                fetch(`${serverUrl}/webhook`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(bookingData)
                })
                .then(res => {
                    if (!res.ok) return res.json().then(err => { throw new Error(err.detail) });
                    return res.json();
                })
                .then(() => {
                    alert("✅ Вы успешно записались! Подтверждение отправлено в бот.");
                    tg.close();
                })
                .catch(err => alert(`Ошибка: ${err.message}`));
            }
        }

        function setRating(r) {
            currentRating = r;
            const stars = document.querySelectorAll('.star');
            stars.forEach((s, idx) => {
                if (idx < r) { s.classList.remove('text-gray-600'); s.classList.add('text-yellow-400'); }
                else { s.classList.remove('text-yellow-400'); s.classList.add('text-gray-600'); }
            });
        }

        function submitReview() {
            const text = document.getElementById('review-text').value;
            if (currentRating === 0) { alert("Выберите оценку!"); return; }
            fetch(`${serverUrl}/review`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: user_id, rating: currentRating, text: text })
            }).then(() => {
                alert("Спасибо за отзыв!");
                tg.close();
            });
        }

        function navClick(type) {
            const nMain = document.getElementById('nav-main');
            const nRev = document.getElementById('nav-reviews');
            if (type === 'main') {
                nMain.className = "flex flex-col items-center space-y-0.5 text-blue-500";
                nRev.className = "flex flex-col items-center space-y-0.5 text-gray-400";
                showScreen('main-screen');
            } else {
                nRev.className = "flex flex-col items-center space-y-0.5 text-blue-500";
                nMain.className = "flex flex-col items-center space-y-0.5 text-gray-400";
                loadReviewsList();
            }
        }

        function loadReviewsList() {
            fetch(`${serverUrl}/reviews`)
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('reviews-list-container');
                    container.innerHTML = "";
                    if(data.length === 0) {
                        container.innerHTML = "<p class='text-gray-500 text-sm text-center py-8'>Отзывов пока нет. Будьте первым!</p>";
                    } else {
                        data.forEach(r => {
                            const div = document.createElement('div');
                            div.className = "bg-gray-800 border border-gray-700 rounded-xl p-4 space-y-1";
                            div.innerHTML = `<div class="flex justify-between text-xs text-gray-400"><strong>${r.name}</strong><span>${r.date}</span></div><div class="text-yellow-400 text-sm">${'★'.repeat(r.rating)}</div><p class="text-sm text-gray-200 mt-1">${r.text || '<i>Без текста</i>'}</p>`;
                            container.appendChild(div);
                        });
                    }
                    showScreen('reviews-list-screen');
                });
        }
    </script>
</body>
</html>
