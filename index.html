<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запись на тренировки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1c1c1e; color: white; padding: 15px; }
        .screen { display: none; }
        .active { display: block; }
        button { width: 100%; padding: 12px; margin: 8px 0; background-color: #2c2c2e; border: none; border-radius: 8px; color: white; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    </style>
</head>
<body>
    <div id="main-screen" class="screen active">
        <h2>Выберите направление</h2>
        <button onclick="selectCategory('Тренажерный зал')">Тренажерный зал</button>
        <button onclick="selectCategory('Катание на коньках')">Катание на коньках</button>
        <button onclick="selectCategory('Хоккейное мастерство')">Хоккейное мастерство</button>
        <button onclick="selectCategory('Броски на сухом льду')">Броски на сухом льду</button>
    </div>

    <div id="services-screen" class="screen">
        <h2 id="services-title"></h2>
        <div id="services-container"></div>
    </div>

    <div id="datetime-screen" class="screen">
        <input id="datepicker" type="date" onchange="onDateSelected(this.value)">
        <div id="slots-grid" class="grid"></div>
    </div>

    <script>
        const serverUrl = "https://9cfd-37-214-43-98.ngrok-free.app";
        let bookingData = {};

        function selectCategory(cat) {
            bookingData.category = cat;
            document.getElementById('services-title').innerText = cat;
            document.getElementById('services-screen').classList.add('active');
            document.getElementById('main-screen').classList.remove('active');
        }

        function onDateSelected(val) {
            fetch(`${serverUrl}/get_blocked_slots/${val}`)
                .then(r => r.json())
                .then(data => {
                    const grid = document.getElementById('slots-grid');
                    grid.innerHTML = "";
                    for (let h = 7; h <= 22; h++) {
                        let t = `${h < 10 ? '0' + h : h}:00`;
                        let btn = document.createElement('button');
                        btn.innerText = t;
                        if (data.blocked_slots.includes(t)) { btn.disabled = true; btn.style.opacity = "0.3"; }
                        else btn.onclick = () => confirmBooking(t);
                        grid.appendChild(btn);
                    }
                });
        }
        
        function confirmBooking(time) {
            bookingData.time = time;
            bookingData.raw_date = document.getElementById('datepicker').value;
            fetch(`${serverUrl}/webhook`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(bookingData)
            }).then(() => alert("Записано!"));
        }
    </script>
</body>
</html>
